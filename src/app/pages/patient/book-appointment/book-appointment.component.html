    <!-- MAIN CONTENT: ORIGINAL ANGULAR FORM (FULLY INTACT) -->
    <div class="container mt-4 content-area">
        <div class="mb-4">
            <h3 class="mb-2 fw-semibold">Book Nurse Appointment</h3>
            <p class="text-muted small">
                Fill in the details below to request a nurse. Our team will confirm your appointment.
            </p>
        </div>

        <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()">

            <!-- Patient Details Card -->
            <div class="card p-3 mb-4">
                <h5><i class="bi bi-person-circle"></i> Patient Details</h5>
                <div class="row mt-2">
                    <div class="col-md-6 mb-3">
                        <label>Full Name *</label>
                        <input class="form-control" formControlName="fullName" placeholder="e.g., Emily Johnson">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Phone *</label>
                        <input class="form-control" formControlName="phone" placeholder="+1 234 567 890">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Email *</label>
                        <input class="form-control" formControlName="email" placeholder="hello@example.com">
                    </div>
                    <div class="col-12 mb-2">
                        <label>Address *</label>
                        <input class="form-control" formControlName="address" placeholder="Street, City, ZIP">
                    </div>
                </div>
            </div>

            <!-- Care Requirements Card -->
            <div class="card p-3 mb-4">
                <h5><i class="bi bi-heart-pulse"></i> Care Requirements</h5>
                <div class="mt-2">
                    <label>Type of Care *</label>
                    <select class="form-select" formControlName="careType">
                        <option value="">Select</option>
                        <option *ngFor="let type of careTypes" [value]="type">{{type}}</option>
                    </select>
                </div>
                <div class="mt-4">
                    <label>Specialization *</label>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        <button type="button"
                            class="btn"
                            *ngFor="let spec of specializations"
                            [class.btn-success]="bookingForm.value.specialization === spec"
                            [class.btn-outline-secondary]="bookingForm.value.specialization !== spec"
                            (click)="selectSpecialization(spec)">
                            {{spec}}
                        </button>
                    </div>
                </div>
                <div class="mt-4">
                    <label>Additional Skills</label>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        <button type="button"
                            class="btn btn-outline-secondary"
                            *ngFor="let skill of skillsList"
                            (click)="toggleSkill(skill)"
                            [class.btn-success]="bookingForm.value.skills.includes(skill)">
                            {{skill}}
                        </button>
                    </div>
                </div>
                <div class="mt-4">
                    <label>Description (symptoms / special requests)</label>
                    <textarea class="form-control" rows="3" formControlName="description" placeholder="Provide any additional details about the required care..."></textarea>
                </div>
            </div>

            <!-- Schedule Card -->
            <div class="card p-3 mb-4">
                <h5><i class="bi bi-calendar-week"></i> Schedule</h5>
                <div class="row mt-2">
                    <div class="col-md-6 mb-3">
                        <label>Start Date *</label>
                        <input type="date" class="form-control" formControlName="startDate">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>End Date (optional)</label>
                        <input type="date" class="form-control" formControlName="endDate">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Time Slot *</label>
                        <select class="form-select" formControlName="timeSlot">
                            <option value="">Select</option>
                            <option>Morning</option>
                            <option>Afternoon</option>
                            <option>Evening</option>
                            <option>Night</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Duration *</label>
                        <select class="form-select" formControlName="durationType">
                            <option value="">Select</option>
                            <option>One-time</option>
                            <option>Daily</option>
                            <option>Weekly</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Priority Card -->
            <div class="card p-3 mb-4">
                <h5><i class="bi bi-exclamation-triangle"></i> Priority</h5>
                <div class="d-flex flex-wrap gap-4 mt-2">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" value="Normal" formControlName="priority" id="priorityNormal">
                        <label class="form-check-label" for="priorityNormal">Normal</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" value="Urgent" formControlName="priority" id="priorityUrgent">
                        <label class="form-check-label text-warning fw-semibold" for="priorityUrgent">Urgent</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" value="Emergency" formControlName="priority" id="priorityEmergency">
                        <label class="form-check-label text-danger fw-semibold" for="priorityEmergency">Emergency</label>
                    </div>
                </div>
            </div>

            <!-- Preferences Card -->
            <div class="card p-3 mb-4">
                <h5><i class="bi bi-sliders2"></i> Preferences</h5>
                <div class="row mt-2">
                    <div class="col-md-6 mb-3">
                        <label>Gender Preference</label>
                        <select class="form-select" formControlName="genderPreference">
                            <option>No Preference</option>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Special Notes (optional)</label>
                        <input class="form-control" formControlName="notes" placeholder="e.g., language preference, allergies...">
                    </div>
                </div>
            </div>

            <button class="btn btn-success w-100 py-3" type="submit">
                <i class="bi bi-check-circle-fill me-2"></i> Book Appointment
            </button>
        </form>
    </div>
